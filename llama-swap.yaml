# llama-swap config — fronts the 80B on port 11434.
# 30B (11435) and 4B (11436) are NOT here; serve.sh runs them natively (always warm).
#
# Behaviour:
#   - On first request to /v1/chat/completions etc., llama-swap spawns llama-server.
#   - After `ttl` seconds with no request, llama-swap stops it and frees GTT.
#   - Subsequent requests within ttl skip the cold start.

healthCheckTimeout: 300   # llama-swap waits up to 5 min for llama-server health check
                          # (80B load + GTT populate can take ~60-90s on this disk)
logLevel: info

models:
  "qwen3-coder-next":
    # ${PORT} is substituted by llama-swap with a free local port; it proxies 11434 -> ${PORT}.
    cmd: |
      taskset -c 0-7 llama-server
        -m /home/ramb0t/models/Qwen3-Coder-Next-GGUF/Qwen3-Coder-Next-UD-Q4_K_XL.gguf
        -c 262144 --parallel 1 --cache-ram 0 -ngl 999 -fa 1 --no-mmap --jinja
        -b 4096 -ub 1024
        -t 8 -tb 8
        --host 127.0.0.1 --port ${PORT} --alias qwen3-coder-next
        --temp 0.7 --top-p 0.8 --top-k 20 --min-p 0
    ttl: 300   # unload after 5 min of inactivity (testing — bump back to 1800 later)
    aliases:
      - qwen3-coder-next-80b
